<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meet Mediluna, the endlessly optimistic otter traveling companion of the Boris compiler ecosystem. Explore artwork, stickers, wallpapers, and lore!">
  <title>{{title}}</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="index.css">
  
  <!-- Canvas Confetti CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="dark-theme">
  <!-- Glowing Background Orbs -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <!-- Header / Navigation -->
  <header class="main-header" id="nav-header">
    <div class="header-container">
      <a href="index.html" class="logo-area" id="brand-logo">
        <img src="logos/logo_simple.png" alt="Mediluna Logo" class="nav-logo-img">
        <span class="logo-text">Mediluna</span>
      </a>
      <div class="nav-links-wrapper">
        {{nav}}
      </div>
      <div class="theme-toggle-area">
        <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
          <svg class="sun-icon" viewBox="0 0 24 24" width="24" height="24">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41z" fill="currentColor"/>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" width="24" height="24">
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10C2.2 6.8 6.5 2.5 11.7 2.1c.5 0 .9.3 1.1.7.2.4.1.9-.2 1.2-1.9 1.9-3 4.5-3 7.2 0 4.1 3.2 7.7 7.3 8.1.5.1.8.4.9.8.1.5-.1.9-.5 1.1-.9.5-1.9.8-3 .8z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Wrapper -->
  <main class="main-content-area">
    {{content}}
  </main>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="section-container footer-container">
      <div class="footer-brand">
        <div class="logo-area">
          <img src="logos/logo_simple.png" alt="Mediluna Logo" class="footer-logo-img">
          <span class="logo-text">Mediluna</span>
        </div>
        <p class="footer-slogan">Acquire fish. Ignore deadlines. 🦦🧣</p>
      </div>
      <div class="footer-bottom">
        <p>Artwork is © its respective creators. Site compiled with 🧸 Boris.</p>
        <p>Built with endless optimism & many snacks.</p>
      </div>
    </div>
  </footer>

  <!-- Lightbox Modal -->
  <div class="lightbox-modal" id="lightbox-modal" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close-btn" aria-label="Close Preview">&times;</button>
    <div class="lightbox-content">
      <img src="" alt="" class="lightbox-img" id="lightbox-img-element">
      <h3 class="lightbox-title" id="lightbox-title-element">Asset Preview</h3>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
