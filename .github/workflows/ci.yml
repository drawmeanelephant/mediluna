name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Run Content Graph Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build and validate site
        run: ./scripts/ci-check.sh

  ci:
    name: ci
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "All CI checks passed!"
